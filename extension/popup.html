<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reway</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell" id="shell">
      <header class="header">
        <img src="icons/icon48.png" alt="" class="logo" aria-hidden="true" />
        <span class="header-title">Reway</span>
        <button id="settings-btn" class="icon-btn" type="button" aria-label="Settings" aria-expanded="false">
          <svg class="ico-gear" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M8 1.75 9.04 3.07l1.7.3 1.29-.77 1.4 1.4-.77 1.29.3 1.7L14.25 8l-1.32 1.04-.3 1.7.77 1.29-1.4 1.4-1.29-.77-1.7.3L8 14.25l-1.04-1.32-1.7-.3-1.29.77-1.4-1.4.77-1.29-.3-1.7L1.75 8l1.32-1.04.3-1.7-.77-1.29 1.4-1.4 1.29.77 1.7-.3L8 1.75Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            <circle cx="8" cy="8" r="2.15" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <svg class="ico-close" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M4.25 4.25 11.75 11.75M11.75 4.25 4.25 11.75" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </header>

      <main id="main-view">
        <p id="notice" class="notice" hidden></p>

        <div class="card save-card">
          <input id="save-url" class="url-input" type="url" placeholder="Paste a URL to save" autocomplete="off" spellcheck="false" />
          <div class="group-picker-wrap">
            <button id="group-btn" class="group-btn" type="button" aria-expanded="false" aria-haspopup="listbox">
              <span id="group-label">Loading groups…</span>
              <span class="chevron" aria-hidden="true"></span>
            </button>
            <div id="group-menu" class="group-menu" role="listbox" hidden></div>
          </div>
          <div id="save-status" class="status"></div>
          <button id="save-btn" class="save-cta" type="button" disabled>
            <span class="cta-star" aria-hidden="true">✦</span>
            <span id="save-label">Save</span>
          </button>
        </div>

        <button id="library-btn" class="library-link" type="button">Manage library →</button>
      </main>

      <div id="settings-view" class="settings-view" hidden>
        <div class="card settings-card">
          <div class="switch-list">
            <label class="switch-field" for="fab-toggle">
              <span class="switch-copy">
                <span class="switch-title">Quick access button</span>
                <span class="switch-note">Show Reway on regular web pages.</span>
              </span>
              <input id="fab-toggle" type="checkbox" role="switch" />
            </label>
            <label class="switch-field" for="x-toggle">
              <span class="switch-copy">
                <span class="switch-title">X bookmark capture</span>
                <span class="switch-note">Auto-save new X bookmarks.</span>
              </span>
              <input id="x-toggle" type="checkbox" role="switch" />
            </label>
          </div>

          <div class="field" id="hidden-hosts-field">
            <span class="field-label">Hidden from FAB</span>
            <div class="inline-input">
              <input id="host-input" type="text" placeholder="example.com" aria-label="Host to hide" />
              <button id="add-host-btn" class="icon-btn" type="button" aria-label="Add host">
                <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
                  <path d="M8 3.25v9.5M3.25 8h9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <div id="host-list" class="host-list" role="list"></div>
            <p id="host-empty" class="field-hint">No hidden hosts.</p>
          </div>

          <div id="settings-status" class="status"></div>
        </div>

        <div class="advanced-wrap">
          <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false" aria-controls="advanced-panel">
            <span>Advanced</span>
            <span class="chevron" aria-hidden="true"></span>
          </button>
          <div id="advanced-panel" hidden>
            <div class="card adv-card">
              <div class="field">
                <span class="field-label">Environment</span>
                <div class="env-toggle" role="group" aria-label="Environment">
                  <button id="env-prod" class="env-btn active" type="button">Production</button>
                  <button id="env-local" class="env-btn" type="button">Local</button>
                </div>
                <p class="field-hint">Use Local only when testing against a local app.</p>
              </div>
              <div id="local-port-field" class="field" hidden>
                <span class="field-label">Port</span>
                <input id="local-port" type="number" placeholder="3000" min="1024" max="65535" />
              </div>
              <button id="apply-env-btn" class="secondary-btn" type="button">Apply &amp; reload</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
